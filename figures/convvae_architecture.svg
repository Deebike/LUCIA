<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="Helvetica,Arial,sans-serif">
  <style>
    .title{font-size:19px;font-weight:700;fill:#1a1a1a}
    .sub{font-size:12px;fill:#555}
    .blk{fill:#eef2f7;stroke:#43546b;stroke-width:1.4}
    .enc{fill:#e7f0e9;stroke:#3c6b4c;stroke-width:1.4}
    .dec{fill:#f3ece4;stroke:#8a6a3c;stroke-width:1.4}
    .lat{fill:#e9e4f2;stroke:#5c4b8a;stroke-width:1.6}
    .lbl{font-size:11px;fill:#20303f;text-anchor:middle}
    .dim{font-size:10px;fill:#607080;text-anchor:middle}
    .arr{stroke:#8895a5;stroke-width:1.6;fill:none;marker-end:url(#a)}
    .note{font-size:11px;fill:#40506a}
    .track{font-size:12px;font-weight:700}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
    <path d="M0,0 L7,3 L0,6 Z" fill="#8895a5"/></marker></defs>

  <text x="24" y="30" class="title">ConvVAE / ConvAE architecture (NB2)</text>
  <text x="24" y="48" class="sub">Two channels (EL_hi, PL_hi), 288 x 576. Track A = deterministic (b=0); Track B = probabilistic latent (small b).</text>

  <!-- input -->
  <rect x="24" y="120" width="70" height="150" rx="4" class="blk"/>
  <text x="59" y="196" class="lbl" transform="rotate(-90 59,196)">input 2 ch</text>
  <text x="59" y="288" class="dim">2 x 288 x 576</text>

  <!-- encoder blocks -->
  <text x="300" y="90" class="track" fill="#3c6b4c">Encoder, 5 x [conv 3x3, stride 2, GroupNorm, SiLU]</text>
  <g>
    <rect x="120" y="135" width="52" height="120" rx="4" class="enc"/><text x="146" y="270" class="dim">32 x 144 x 288</text>
    <rect x="190" y="150" width="50" height="90" rx="4" class="enc"/><text x="215" y="270" class="dim">64 x 72 x 144</text>
    <rect x="258" y="163" width="46" height="64" rx="4" class="enc"/><text x="281" y="270" class="dim">128 x 36 x 72</text>
    <rect x="322" y="173" width="42" height="44" rx="4" class="enc"/><text x="343" y="270" class="dim">256 x 18 x 36</text>
    <rect x="382" y="181" width="40" height="28" rx="4" class="enc"/><text x="402" y="270" class="dim">512 x 9 x 18</text>
  </g>

  <!-- latent -->
  <rect x="452" y="168" width="86" height="54" rx="6" class="lat"/>
  <text x="495" y="190" class="lbl">flatten - fc</text>
  <text x="495" y="206" class="lbl">z (64-d)</text>
  <text x="495" y="250" class="dim">Track B: mu, log-var</text>
  <text x="495" y="264" class="dim">Track A: z only</text>

  <!-- decoder blocks -->
  <text x="640" y="90" class="track" fill="#8a6a3c">Decoder, fc - 5 x [transposed-conv 3x3, stride 2]</text>
  <g>
    <rect x="566" y="181" width="40" height="28" rx="4" class="dec"/><text x="586" y="270" class="dim">512 x 9 x 18</text>
    <rect x="624" y="173" width="42" height="44" rx="4" class="dec"/><text x="645" y="270" class="dim">256 x 18 x 36</text>
    <rect x="684" y="163" width="46" height="64" rx="4" class="dec"/><text x="707" y="270" class="dim">128 x 36 x 72</text>
    <rect x="748" y="150" width="50" height="90" rx="4" class="dec"/><text x="773" y="270" class="dim">64 x 72 x 144</text>
    <rect x="816" y="135" width="52" height="120" rx="4" class="dec"/><text x="842" y="270" class="dim">32 x 144 x 288</text>
  </g>

  <!-- output -->
  <rect x="886" y="120" width="70" height="150" rx="4" class="blk"/>
  <text x="921" y="205" class="lbl" transform="rotate(-90 921,205)">recon 2 ch</text>
  <text x="921" y="288" class="dim">2 x 288 x 576</text>

  <!-- flow arrows -->
  <path class="arr" d="M96,195 L118,195"/>
  <path class="arr" d="M424,195 L450,195"/>
  <path class="arr" d="M540,195 L564,195"/>
  <path class="arr" d="M870,195 L884,195"/>

  <!-- track outputs -->
  <text x="24" y="330" class="track" fill="#3c6b4c">Track A (ConvAE, b=0, denoising)</text>
  <text x="24" y="348" class="note">val recon 0.0239 · recon MSE 0.0144 · pixel-rho 0.982   ->   NB4 reconstruction-residual defect maps (5.3)</text>
  <text x="24" y="378" class="track" fill="#5c4b8a">Track B (ConvVAE, small b)</text>
  <text x="24" y="396" class="note">val recon 0.0281 (~17% overhead) · posterior not collapsed (per-cell mu std ~ 42.2)   ->   NB5 diffusion latent (5.5)</text>
  <text x="24" y="426" class="note">MLP-VAE on the cell-feature vector was tried first and abandoned (posterior collapse; silhouette -0.135 on Pmax-rank bins).</text>
</svg>
