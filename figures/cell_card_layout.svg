<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Helvetica,Arial,sans-serif">
  <style>
    .title{font-size:18px;font-weight:700;fill:#1a1a1a}
    .hdr{fill:#43546b}
    .hdrT{font-size:12px;fill:#ffffff}
    .strip{fill:#eef2f7;stroke:#8fa0b5;stroke-width:1}
    .p1{fill:#e7f0e9;stroke:#3c6b4c;stroke-width:1.4}
    .p2{fill:#fdf3dc;stroke:#a8842c;stroke-width:1.4}
    .p3{fill:#e9e4f2;stroke:#5c4b8a;stroke-width:1.4}
    .opt{fill:#f2f2f2;stroke:#9a9a9a;stroke-width:1.2;stroke-dasharray:5 3}
    .pt{font-size:12.5px;font-weight:700;fill:#20303f}
    .pd{font-size:10.5px;fill:#40506a}
    .thumb{fill:#dfe6ee;stroke:#9fb0c2;stroke-width:0.8}
    .tlbl{font-size:8.5px;fill:#5a6b7d;text-anchor:middle}
    .badge{fill:#c0392b}
    .badgeT{font-size:9.5px;fill:#ffffff;font-weight:700}
    .note{font-size:10.5px;fill:#5a6b7d}
  </style>

  <text x="24" y="28" class="title">NB7 per-cell report card, layout and content</text>

  <!-- card outline -->
  <rect x="24" y="46" width="952" height="470" rx="8" fill="#ffffff" stroke="#43546b" stroke-width="1.6"/>

  <!-- header band -->
  <rect x="24" y="46" width="952" height="40" rx="8" class="hdr"/>
  <text x="40" y="71" class="hdrT">cell id (redacted) · split: test · true IV (normalized)</text>
  <rect x="820" y="54" width="120" height="24" rx="12" class="badge"/>
  <text x="838" y="70" class="badgeT">ABSTAINED (if R1/R2)</text>

  <!-- input strip: 7 channel thumbnails -->
  <rect x="40" y="100" width="920" height="86" rx="5" class="strip"/>
  <text x="52" y="118" class="pt">Input strip, 7 channels</text>
  <g>
    <rect x="60"  y="126" width="110" height="48" class="thumb"/><text x="115" y="186" class="tlbl">EL_lo (stamped)</text>
    <rect x="185" y="126" width="110" height="48" class="thumb"/><text x="240" y="186" class="tlbl">EL_hi (stamped)</text>
    <rect x="310" y="126" width="110" height="48" class="thumb"/><text x="365" y="186" class="tlbl">PL_hi (stamped)</text>
    <rect x="435" y="126" width="110" height="48" class="thumb"/><text x="490" y="186" class="tlbl">PL_lo (stamped)</text>
    <rect x="560" y="126" width="110" height="48" class="thumb"/><text x="615" y="186" class="tlbl">rs_map</text>
    <rect x="685" y="126" width="110" height="48" class="thumb"/><text x="740" y="186" class="tlbl">log_el_pl</text>
    <rect x="810" y="126" width="110" height="48" class="thumb"/><text x="865" y="186" class="tlbl">grad_el_hi</text>
  </g>

  <!-- panel 1: IV -->
  <rect x="40" y="204" width="290" height="230" rx="6" class="p1"/>
  <text x="56" y="228" class="pt">(1) IV prediction</text>
  <text x="56" y="248" class="pd">seven targets, mu +/- sigma versus true,</text>
  <text x="56" y="263" class="pd">values normalized to cohort max</text>
  <text x="56" y="286" class="pd">constraint audit: residuals of</text>
  <text x="56" y="301" class="pd">Pmax = Vmax*Imax = FF*Voc*Isc</text>
  <text x="56" y="324" class="pd">on abstention: ABSTAINED badge,</text>
  <text x="56" y="339" class="pd">no deficit/loss annotations</text>

  <!-- panel 2: defect map -->
  <rect x="352" y="204" width="290" height="230" rx="6" class="p2"/>
  <text x="368" y="228" class="pt">(2) Defect map (where)</text>
  <text x="368" y="248" class="pd">reconstruction residual, full resolution,</text>
  <text x="368" y="263" class="pd">plus the 9 x 18 tile aggregation</text>
  <text x="368" y="286" class="pd">appearance only: shows where the</text>
  <text x="368" y="301" class="pd">structure is, no electrical attribution</text>
  <text x="368" y="324" class="pd">retained even when the cell abstains</text>

  <!-- panel 3: electrical loss -->
  <rect x="664" y="204" width="296" height="230" rx="6" class="p3"/>
  <text x="680" y="228" class="pt">(3) Electrical loss (whole-cell)</text>
  <text x="680" y="248" class="pd">S1 deficit versus the cohort-p90 ideal,</text>
  <text x="680" y="263" class="pd">reference re-definable (section 5.3)</text>
  <text x="680" y="286" class="pd">S2 real-to-healed / S3 real-to-defected</text>
  <text x="680" y="301" class="pd">thumbnails where available; the</text>
  <text x="680" y="316" class="pd">re-predicted delta-IV is ~0 (section 5.5)</text>
  <text x="680" y="339" class="pd">abstained: S1 suppressed (NaN)</text>

  <!-- optional row -->
  <rect x="40" y="450" width="920" height="46" rx="6" class="opt"/>
  <text x="56" y="470" class="pt">(optional) Tier-C IV row</text>
  <text x="56" y="486" class="pd">cross-tile transformer predictions, shown for comparison only; negative result, not part of the deliverable (section 5.4)</text>

  <text x="24" y="540" class="note">One card per cell; the five envelope cards (high-performing, median, low-FF, low-Pmax, high-Rs/abstained) are in Appendix G.</text>
</svg>
